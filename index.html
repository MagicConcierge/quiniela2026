<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 🏆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2342;
  --green: #1a5c38;
  --gold: #f0a500;
  --gold-light: #fef3d0;
  --red: #c0392b;
  --bg: #f5f6fa;
  --surface: #ffffff;
  --border: #e2e4ec;
  --text: #1a1e2e;
  --muted: #6b7280;
  --radius: 10px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app-header { background: var(--navy); padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
.logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; line-height: 1.1; }
.logo span { display: block; font-size: 0.85rem; font-weight: 500; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; }
.header-ball { font-size: 2rem; }
.scoreboard-wrap { background: var(--navy); padding: 0 1.5rem 1.25rem; }
.scoreboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 640px; }
.score-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius); padding: 0.75rem; text-align: center; position: relative; }
.score-card.leader { border-color: var(--gold); background: rgba(240,165,0,0.12); }
.score-name { font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.5px; }
.score-pts { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; color: #fff; line-height: 1.1; }
.score-pts.leader-pts { color: var(--gold); }
.score-label { font-size: 0.65rem; color: rgba(255,255,255,0.4); }
.medal { position: absolute; top: 5px; right: 7px; font-size: 0.9rem; }
.main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 4px; flex-wrap: wrap; }
.tab { flex: 1; padding: 7px 4px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all 0.15s; white-space: nowrap; text-align: center; min-width: 50px; }
.tab.active { background: var(--navy); color: #fff; }
.tab:hover:not(.active) { background: var(--bg); color: var(--text); }
.phase-panel { display: none; }
.phase-panel.active { display: block; }
.group-section { margin-bottom: 1.25rem; }
.group-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 99px; display: inline-block; padding: 3px 10px; margin-bottom: 6px; }
.ai-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: var(--gold-light); border: 1px solid #e8c55a; border-radius: 99px; font-size: 0.78rem; font-weight: 600; color: #8a6000; cursor: pointer; margin-bottom: 1rem; transition: background 0.15s; }
.ai-btn:hover { background: #fde98e; }
.col-header { display: grid; grid-template-columns: 26px 1fr 1fr 60px repeat(4, 46px); gap: 4px; padding: 4px 8px; font-size: 0.67rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.col-header div { text-align: center; }
.match-row { display: grid; grid-template-columns: 26px 1fr 1fr 60px repeat(4, 46px); gap: 4px; align-items: center; padding: 5px 8px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); margin-bottom: 3px; transition: border-color 0.15s; }
.match-row:hover { border-color: #c0c8e0; }
.match-num { font-size: 0.68rem; color: var(--muted); text-align: center; font-weight: 500; }
.team-name { font-size: 0.78rem; font-weight: 500; color: var(--text); padding: 0 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.team-name.away { text-align: right; }
.result-sel { width: 100%; font-size: 0.76rem; font-weight: 700; text-align: center; border: 1.5px solid var(--border); border-radius: 7px; padding: 4px 2px; background: #fffde7; color: var(--red); cursor: pointer; appearance: none; -webkit-appearance: none; font-family: 'Inter', sans-serif; }
.result-sel.set { background: var(--green); color: #fff; border-color: var(--green); }
.pred-btn { width: 46px; height: 29px; font-size: 0.78rem; font-weight: 700; border-radius: 7px; border: 1.5px solid var(--border); cursor: pointer; background: var(--bg); color: var(--muted); transition: all 0.12s; font-family: 'Inter', sans-serif; }
.pred-btn:hover { background: #e8ecf5; }
.pred-btn.sel-1 { background: var(--green); color: #fff; border-color: var(--green); }
.pred-btn.sel-X { background: var(--navy); color: #fff; border-color: var(--navy); }
.pred-btn.sel-2 { background: var(--red); color: #fff; border-color: var(--red); }
.pred-btn.correct { outline: 2.5px solid var(--gold); outline-offset: 1px; }
.phase-totals { display: flex; justify-content: flex-end; gap: 6px; padding: 10px 8px 0; border-top: 1px solid var(--border); margin-top: 8px; }
.phase-total-item { text-align: center; min-width: 46px; }
.phase-total-name { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
.phase-total-pts { font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--navy); }
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--muted); font-weight: 500; }
.legend-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
#confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
@media (max-width: 540px) {
  .scoreboard { grid-template-columns: repeat(2, 1fr); }
  .col-header, .match-row { grid-template-columns: 20px 1fr 1fr 50px repeat(4, 36px); gap: 3px; }
  .pred-btn { width: 36px; height: 27px; font-size: 0.7rem; }
  .col-header { font-size: 0.6rem; }
  .team-name { font-size: 0.7rem; }
  .tab { font-size: 0.65rem; padding: 6px 2px; }
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<header class="app-header">
  <div class="header-ball" aria-hidden="true">&#x26BD;</div>
  <div class="logo">Quiniela <span>Mundial 2026</span></div>
</header>
<div class="scoreboard-wrap">
  <div class="scoreboard" id="scoreboard"></div>
</div>
<main class="main">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> 1 = Local gana</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--navy)"></div> X = Empate</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> 2 = Visitante gana</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gold); border-radius:4px;"></div> Acierto = 3 pts</div>
  </div>
  <div class="tabs" id="tabs" role="tablist"></div>
  <div id="panels"></div>
</main>
<script>
const MEMBERS = ["Mamá","Papá","Lucca","Liam"];
const PTS = 3;
const KEY = "quiniela2026_family_v3";

// Fixture oficial FIFA 2026 (fuente: ESPN Deportes / FIFA)
// Formato: [local, visitante, grupo, fecha_mex]
const GRUPOS_RAW = [
  // GRUPO A
  {g:"A", m:[["México","Sudáfrica"],["Corea del Sur","R. Checa"],["R. Checa","Sudáfrica"],["México","Corea del Sur"],["R. Checa","México"],["Sudáfrica","Corea del Sur"]]},
  // GRUPO B
  {g:"B", m:[["Canadá","Bosnia-Herz."],["Qatar","Suiza"],["Suiza","Bosnia-Herz."],["Canadá","Qatar"],["Suiza","Canadá"],["Bosnia-Herz.","Qatar"]]},
  // GRUPO C
  {g:"C", m:[["Brasil","Marruecos"],["Haití","Escocia"],["Escocia","Marruecos"],["Brasil","Haití"],["Escocia","Brasil"],["Marruecos","Haití"]]},
  // GRUPO D
  {g:"D", m:[["Estados Unidos","Paraguay"],["Australia","Turquía"],["Estados Unidos","Australia"],["Turquía","Paraguay"],["Turquía","Estados Unidos"],["Paraguay","Australia"]]},
  // GRUPO E
  {g:"E", m:[["Alemania","Curazao"],["Costa de Marfil","Ecuador"],["Alemania","Costa de Marfil"],["Ecuador","Curazao"],["Ecuador","Alemania"],["Curazao","Costa de Marfil"]]},
  // GRUPO F
  {g:"F", m:[["Países Bajos","Japón"],["Suecia","Túnez"],["Países Bajos","Suecia"],["Túnez","Japón"],["Túnez","Países Bajos"],["Japón","Suecia"]]},
  // GRUPO G
  {g:"G", m:[["Bélgica","Egipto"],["Irán","Nueva Zelanda"],["Bélgica","Irán"],["Nueva Zelanda","Egipto"],["Nueva Zelanda","Bélgica"],["Egipto","Irán"]]},
  // GRUPO H
  {g:"H", m:[["España","Cabo Verde"],["Arabia Saudita","Uruguay"],["España","Arabia Saudita"],["Uruguay","Cabo Verde"],["Uruguay","España"],["Cabo Verde","Arabia Saudita"]]},
  // GRUPO I
  {g:"I", m:[["Francia","Senegal"],["Irak","Noruega"],["Francia","Irak"],["Noruega","Senegal"],["Noruega","Francia"],["Senegal","Irak"]]},
  // GRUPO J
  {g:"J", m:[["Argentina","Argelia"],["Austria","Jordania"],["Argentina","Austria"],["Jordania","Argelia"],["Jordania","Argentina"],["Argelia","Austria"]]},
  // GRUPO K
  {g:"K", m:[["Portugal","RD Congo"],["Uzbekistán","Colombia"],["Portugal","Uzbekistán"],["Colombia","RD Congo"],["Colombia","Portugal"],["RD Congo","Uzbekistán"]]},
  // GRUPO L
  {g:"L", m:[["Inglaterra","Croacia"],["Ghana","Panamá"],["Inglaterra","Ghana"],["Panamá","Croacia"],["Panamá","Inglaterra"],["Croacia","Ghana"]]},
];

// Aplanar grupos a lista de partidos con etiqueta de grupo
const gruposMatches = [];
const gruposLabels = []; // para agrupar visualmente
GRUPOS_RAW.forEach(gr => {
  gr.m.forEach(match => {
    gruposMatches.push(match);
    gruposLabels.push(gr.g);
  });
});

const PHASES = [
  { id:"grupos", label:"Grupos", matches: gruposMatches, labels: gruposLabels },
  { id:"r32", label:"Ronda 32", matches:[
    ["1A","3B/C/D/E"],["1B","3A/C/D/F"],["1C","3G/H/I"],["1D","3J/K/L"],
    ["1E","3A/B/C/D"],["1F","3H/I/J"],["1G","3A/E/F"],["1H","3B/G/K"],
    ["1I","3C/E/F/H"],["1J","3D/F/G/I"],["1K","3A/B/L"],["1L","3B/E/K"],
    ["2A","2C"],["2B","2D"],["2E","2G"],["2F","2H"],
  ]},
  { id:"octavos", label:"Octavos", matches:[
    ["R32-1","R32-2"],["R32-3","R32-4"],["R32-5","R32-6"],["R32-7","R32-8"],
    ["R32-9","R32-10"],["R32-11","R32-12"],["R32-13","R32-14"],["R32-15","R32-16"],
  ]},
  { id:"cuartos", label:"Cuartos", matches:[
    ["Oct. 1","Oct. 2"],["Oct. 3","Oct. 4"],["Oct. 5","Oct. 6"],["Oct. 7","Oct. 8"],
  ]},
  { id:"semis", label:"Semis", matches:[
    ["Cto. 1","Cto. 2"],["Cto. 3","Cto. 4"],
  ]},
  { id:"final", label:"&#x1F3C6; Final", matches:[
    ["Semifinal 1","Semifinal 2"],
  ]},
];

let state = {};

function loadState() {
  try { const s = localStorage.getItem(KEY); if (s) state = JSON.parse(s); } catch(e){}
  PHASES.forEach(ph => {
    if (!state[ph.id]) state[ph.id] = ph.matches.map(() => ({ real:"", preds:["","","",""] }));
    else if (state[ph.id].length < ph.matches.length) {
      while (state[ph.id].length < ph.matches.length) state[ph.id].push({ real:"", preds:["","","",""] });
    }
  });
}

function saveState() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
}

function getTotals() {
  return MEMBERS.map((_,mi) =>
    PHASES.reduce((acc,ph) =>
      acc + state[ph.id].reduce((a,m) =>
        a + (m.real && m.preds[mi] && m.real===m.preds[mi] ? PTS : 0), 0), 0)
  );
}

function renderScoreboard() {
  const totals = getTotals();
  const max = Math.max(...totals);
  const sorted = totals.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
  const medals = ["🥇","🥈","🥉","4️⃣"];
  document.getElementById("scoreboard").innerHTML = MEMBERS.map((name,i)=>{
    const rank = sorted.findIndex(x=>x.i===i);
    const leader = totals[i]===max && max>0;
    return `<div class="score-card ${leader?'leader':''}">
      <span class="medal">${medals[rank]}</span>
      <div class="score-name">${name}</div>
      <div class="score-pts ${leader?'leader-pts':''}">${totals[i]}</div>
      <div class="score-label">puntos</div>
    </div>`;
  }).join("");
}

function renderPhase(ph) {
  const data = state[ph.id];
  const isGrupos = ph.id === "grupos";
  const memberCols = MEMBERS.map(m=>`<div>${m.split(" ")[0]}</div>`).join("");
  let html = `<button class="ai-btn" onclick="askAI('${ph.id}')">&#x2728; Pedir predicciones a la IA</button>`;
  html += `<div class="col-header"><div>#</div><div style="text-align:left;padding-left:4px">Local</div><div>Visitante</div><div>Real</div>${memberCols}</div>`;

  let currentGroup = null;
  data.forEach((match,mi)=>{
    const [local, vis] = ph.matches[mi];

    if (isGrupos && ph.labels) {
      const grp = ph.labels[mi];
      if (grp !== currentGroup) {
        currentGroup = grp;
        html += `<div style="padding:4px 0 2px"><span class="group-label">Grupo ${grp}</span></div>`;
      }
    }

    const preds = MEMBERS.map((_,pi)=>{
      const v = match.preds[pi];
      const ok = match.real && v && match.real===v;
      return `<button class="pred-btn ${v?'sel-'+v:''} ${ok?'correct':''}" onclick="cyclePred('${ph.id}',${mi},${pi})">${v||"?"}</button>`;
    }).join("");

    html += `<div class="match-row">
      <div class="match-num">${mi+1}</div>
      <div class="team-name" title="${local}">${local}</div>
      <div class="team-name away" title="${vis}">${vis}</div>
      <select class="result-sel ${match.real?'set':''}" onchange="setReal('${ph.id}',${mi},this.value)">
        <option value="">—</option>
        <option value="1" ${match.real==="1"?"selected":""}>1</option>
        <option value="X" ${match.real==="X"?"selected":""}>X</option>
        <option value="2" ${match.real==="2"?"selected":""}>2</option>
      </select>
      ${preds}
    </div>`;
  });

  const phasePts = MEMBERS.map((_,pi)=>
    data.reduce((a,m)=>a+(m.real&&m.preds[pi]&&m.real===m.preds[pi]?PTS:0),0)
  );
  html += `<div class="phase-totals">${MEMBERS.map((name,i)=>`
    <div class="phase-total-item">
      <div class="phase-total-name">${name.split(" ")[0]}</div>
      <div class="phase-total-pts">${phasePts[i]}</div>
    </div>`).join("")}</div>`;
  return html;
}

function cyclePred(phId, mi, pi) {
  const cycle = ["1","X","2",""];
  const cur = state[phId][mi].preds[pi];
  state[phId][mi].preds[pi] = cycle[(cycle.indexOf(cur)+1)%cycle.length];
  saveState();
  rerenderPhase(phId);
  renderScoreboard();
  const real = state[phId][mi].real;
  if (real && state[phId][mi].preds[pi]===real) confetti();
}

function setReal(phId, mi, val) {
  state[phId][mi].real = val;
  saveState();
  rerenderPhase(phId);
  renderScoreboard();
  if (val && state[phId][mi].preds.some(p=>p===val)) confetti();
}

function rerenderPhase(phId) {
  const ph = PHASES.find(p=>p.id===phId);
  const panel = document.getElementById("panel-"+phId);
  if (panel) panel.innerHTML = renderPhase(ph);
}

function setTab(id) {
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("active", t.dataset.id===id);
    t.setAttribute("aria-selected", t.dataset.id===id);
  });
  document.querySelectorAll(".phase-panel").forEach(p=>
    p.classList.toggle("active", p.id==="panel-"+id)
  );
}

function askAI(phId) {
  const ph = PHASES.find(p=>p.id===phId);
  const list = ph.matches.slice(0,20).map((m,i)=>`${i+1}. ${m[0]} vs ${m[1]}`).join(", ");
  const label = ph.label.replace(/[^\w\s]/gi,"").trim();
  const msg = `Soy parte de una quiniela familiar del Mundial 2026. Dame predicciones (1=local gana, X=empate, 2=visitante gana) para la fase "${label}". Primeros partidos: ${list}. Responde en formato de lista breve con partido y predicción.`;
  if (typeof sendPrompt === 'function') sendPrompt(msg);
  else alert("Esta función solo está disponible dentro de Claude. En tu HTML puedes copiar el mensaje:\n\n" + msg);
}

function confetti() {
  const canvas = document.getElementById("confetti-canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ["#f0a500","#1a5c38","#0f2342","#c0392b","#27ae60","#3498db","#f39c12","#9b59b6"];
  const pieces = Array.from({length:110},()=>({
    x: Math.random()*canvas.width, y: -20,
    vx: (Math.random()-0.5)*5, vy: Math.random()*5+2,
    color: colors[Math.floor(Math.random()*colors.length)],
    w: Math.random()*8+4, h: Math.random()*5+3,
    rot: Math.random()*360, vr: (Math.random()-0.5)*10, vy0: 0,
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.07;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    });
    frame++;
    if(frame<170) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// Init
loadState();
const tabsEl = document.getElementById("tabs");
const panelsEl = document.getElementById("panels");
PHASES.forEach((ph,i)=>{
  const tab = document.createElement("button");
  tab.className = "tab"+(i===0?" active":"");
  tab.innerHTML = ph.label;
  tab.dataset.id = ph.id;
  tab.setAttribute("role","tab");
  tab.setAttribute("aria-selected", i===0?"true":"false");
  tab.onclick = ()=>setTab(ph.id);
  tabsEl.appendChild(tab);

  const panel = document.createElement("div");
  panel.className = "phase-panel"+(i===0?" active":"");
  panel.id = "panel-"+ph.id;
  panel.setAttribute("role","tabpanel");
  panel.innerHTML = renderPhase(ph);
  panelsEl.appendChild(panel);
});
renderScoreboard();
</script>
</body>
</html>
