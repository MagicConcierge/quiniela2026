<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚽ Quiniela BraBo · Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1a237e;
  --blue:   #1976d2;
  --blue2:  #42a5f5;
  --green:  #2e7d32;
  --green2: #66bb6a;
  --gold:   #f9a825;
  --gold2:  #ffcc02;
  --red:    #c62828;
  --red2:   #ef5350;
  --purple: #6a1b9a;
  --orange: #e65100;
  --bg:     #f0f7ff;
  --surface:#ffffff;
  --border: #dde8f5;
  --text:   #1a237e;
  --muted:  #7986a8;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(26,35,126,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(160deg, #1a237e 0%, #1976d2 50%, #42a5f5 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
}
.load-ball { font-size: 4rem; animation: bounce 0.7s ease-in-out infinite alternate; }
@keyframes bounce { from{transform:translateY(0) scale(1)} to{transform:translateY(-16px) scale(1.1)} }
.load-title { font-family:'Fredoka One',sans-serif; font-size:2rem; color:#fff; letter-spacing:2px; }
.load-sub { font-size:0.85rem; color:rgba(255,255,255,0.7); }

/* ── LOGIN ── */
#login-screen {
  min-height:100vh; display:none; align-items:center; justify-content:center;
  background: linear-gradient(160deg, #1a237e 0%, #1976d2 60%, #e3f2fd 100%);
  padding:1.5rem; overflow-y:auto;
}
.login-card {
  background:#fff; border-radius:28px; padding:2rem 1.5rem;
  width:100%; max-width:380px;
  box-shadow: 0 20px 60px rgba(26,35,126,0.3), 0 0 0 4px rgba(255,255,255,0.2);
}
.login-top { text-align:center; margin-bottom:1.5rem; }
.login-emoji { font-size:3.5rem; }
.login-title { font-family:'Fredoka One',sans-serif; font-size:2.2rem; color:var(--navy); letter-spacing:1px; margin-top:4px; }
.login-sub { font-size:0.82rem; color:var(--muted); margin-top:4px; }
.login-label { font-size:0.72rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
.member-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:1.25rem; }
.member-btn {
  padding:13px 8px; border-radius:14px; border:2.5px solid var(--border);
  font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800;
  cursor:pointer; background:var(--bg); color:var(--navy); transition:all 0.15s; text-align:center;
}
.member-btn:hover { border-color:var(--blue); background:#e8f0fe; transform:translateY(-2px); }
.member-btn.selected { border-color:var(--navy); background:var(--navy); color:#fff; transform:translateY(-2px); box-shadow:0 4px 14px rgba(26,35,126,0.3); }
.login-enter {
  width:100%; padding:15px; background:linear-gradient(135deg,var(--gold),#f57f17);
  border:none; border-radius:14px; font-family:'Fredoka One',sans-serif;
  font-size:1.2rem; letter-spacing:1px; color:#fff; cursor:pointer; transition:all 0.15s;
  box-shadow:0 4px 16px rgba(249,168,37,0.4);
}
.login-enter:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px rgba(249,168,37,0.5); }
.login-enter:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; box-shadow:none; transform:none; }

/* ── APP ── */
#app { display:none; }

/* ── HEADER ── */
.app-header {
  background:linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  padding:0.9rem 1.25rem; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(26,35,126,0.25);
}
.header-brand { display:flex; align-items:center; gap:10px; }
.header-ball { font-size:1.6rem; animation: spin 8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.header-title { font-family:'Fredoka One',sans-serif; font-size:1.3rem; color:var(--gold2); letter-spacing:1px; line-height:1.1; }
.header-sub { font-size:0.62rem; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:1px; }
.user-pill {
  display:flex; align-items:center; gap:7px; background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.2); border-radius:99px; padding:6px 14px;
  cursor:pointer; transition:all 0.15s;
}
.user-pill:hover { background:rgba(255,255,255,0.25); }
.user-dot { width:8px; height:8px; border-radius:50%; background:var(--green2); flex-shrink:0; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
.user-name { font-size:0.85rem; font-weight:800; color:#fff; }
.user-change { font-size:0.62rem; color:rgba(255,255,255,0.5); }

/* ── SYNC ── */
.sync-bar { background:var(--navy); padding:3px 1.25rem; font-size:0.62rem; color:rgba(255,255,255,0.4); text-align:right; }
.sync-bar.syncing { color:var(--gold2); }
.sync-bar.error   { color:var(--red2); }

/* ── SCOREBOARD ── */
.scoreboard-section { background:linear-gradient(135deg,var(--navy),var(--blue)); padding:0.75rem 1rem 1.1rem; }
.section-label { font-size:0.65rem; font-weight:800; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:2px; margin-bottom:0.75rem; }
.scores-scroll { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.scores-scroll::-webkit-scrollbar { display:none; }
.score-card {
  background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.15);
  border-radius:14px; padding:0.65rem 0.75rem; text-align:center;
  min-width:72px; flex-shrink:0; position:relative; transition:all 0.2s;
}
.score-card.me { border-color:var(--gold2); background:rgba(255,204,2,0.2); }
.score-card.top1 { border-color:var(--green2); }
.score-medal { position:absolute; top:3px; right:5px; font-size:0.75rem; }
.score-name { font-size:0.62rem; font-weight:800; color:rgba(255,255,255,0.7); text-transform:uppercase; }
.score-pts  { font-family:'Fredoka One',sans-serif; font-size:2rem; color:#fff; line-height:1; }
.score-pts.gold { color:var(--gold2); }
.score-lbl  { font-size:0.55rem; color:rgba(255,255,255,0.4); }

/* ── MAIN ── */
.main { max-width:600px; margin:0 auto; padding:1.25rem 0.9rem 5rem; }

/* ── TABS ── */
.tabs-wrap {
  display:flex; gap:4px; margin-bottom:1.25rem;
  background:var(--surface); border:2px solid var(--border);
  border-radius:99px; padding:4px; overflow-x:auto; scrollbar-width:none;
  box-shadow:var(--shadow);
}
.tabs-wrap::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:7px 10px; border-radius:99px;
  font-family:'Nunito',sans-serif; font-size:0.72rem; font-weight:800;
  cursor:pointer; border:none; background:transparent; color:var(--muted);
  transition:all 0.15s; white-space:nowrap;
}
.tab.active { background:var(--navy); color:#fff; box-shadow:0 2px 10px rgba(26,35,126,0.3); }
.tab:hover:not(.active) { background:var(--bg); color:var(--navy); }
.phase-panel { display:none; }
.phase-panel.active { display:block; }

/* ── DATE DIVIDER ── */
.date-divider { display:flex; align-items:center; gap:10px; margin:1rem 0 0.6rem; }
.date-line { flex:1; height:2px; background:linear-gradient(90deg,transparent,var(--border),transparent); }
.date-label { font-family:'Fredoka One',sans-serif; font-size:0.85rem; color:var(--blue); white-space:nowrap; padding:0 4px; }

/* ── MATCH CARD ── */
.match-card {
  background:var(--surface); border-radius:var(--radius); border:2px solid var(--border);
  margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow); transition:all 0.2s;
}
.match-card:hover { border-color:var(--blue2); box-shadow:0 8px 30px rgba(26,35,126,0.15); transform:translateY(-1px); }
.match-card.has-result { border-color:#a5d6a7; }
.match-card.started   { border-color:#ffcc80; }

.match-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px 0;
}
.match-group-badge {
  background:var(--navy); color:#fff; font-size:0.6rem; font-weight:800;
  padding:3px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:0.5px;
  font-family:'Nunito',sans-serif;
}
.match-time-badge { font-size:0.62rem; color:var(--muted); font-weight:700; }

/* Teams */
.teams-row {
  display:grid; grid-template-columns:1fr 48px 1fr; gap:6px;
  align-items:center; padding:10px 14px 4px;
}
.team-block { display:flex; flex-direction:column; align-items:center; gap:4px; }
.team-flag  { font-size:2rem; line-height:1; }
.team-name  { font-size:0.82rem; font-weight:800; color:var(--navy); text-align:center; line-height:1.2; }
.vs-orb {
  width:48px; height:48px; border-radius:50%;
  background:var(--bg); border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',sans-serif; font-size:0.8rem; color:var(--muted); flex-shrink:0;
}
.vs-orb.done { background:#e8f5e9; border-color:var(--green2); color:var(--green); font-size:1.1rem; font-weight:900; }

/* Result buttons */
.result-row {
  display:grid; grid-template-columns:1fr 56px 1fr; gap:6px; padding:5px 14px 10px;
}
.res-btn {
  padding:9px 4px; border-radius:10px; border:2px solid var(--border);
  font-size:0.75rem; font-weight:800; cursor:pointer; background:var(--bg);
  color:var(--muted); transition:all 0.12s; font-family:'Nunito',sans-serif; text-align:center;
}
.res-btn:hover { border-color:var(--blue); background:#e8f0fe; }
.res-btn.active-1 { background:#e8f5e9; border-color:var(--green2); color:var(--green); }
.res-btn.active-2 { background:#ffebee; border-color:var(--red2); color:var(--red); }
.res-btn.readonly { cursor:default; }
.res-btn-empate {
  padding:9px 4px; border-radius:10px; border:2px solid var(--border);
  font-size:0.65rem; font-weight:800; cursor:pointer; background:var(--bg);
  color:var(--muted); transition:all 0.12s; font-family:'Nunito',sans-serif; text-align:center; line-height:1.3;
}
.res-btn-empate:hover { border-color:var(--blue); background:#e8f0fe; }
.res-btn-empate.active-X { background:#e8f0fe; border-color:var(--blue); color:var(--blue); }
.res-btn-empate.readonly { cursor:default; }

/* Predictions */
.preds-area { border-top:2px solid var(--border); padding:10px 14px 12px; background:#fafcff; }
.preds-title { font-size:0.65rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; }
.preds-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:6px; }
.pred-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:var(--surface); border-radius:12px; padding:8px 5px;
  border:2px solid var(--border); transition:all 0.12s; position:relative;
}
.pred-item.is-me   { border-color:var(--navy); background:#e8f0fe; }
.pred-item.correct { border-color:var(--gold); background:#fffde7; }
.pred-name { font-size:0.62rem; font-weight:800; color:var(--muted); text-align:center; }
.pred-name.me { color:var(--navy); }
.pred-btn {
  width:100%; padding:6px 3px; border-radius:8px; border:2px solid var(--border);
  font-size:0.88rem; cursor:pointer; background:var(--bg); color:var(--muted);
  transition:all 0.12s; font-family:'Nunito',sans-serif; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:1px; line-height:1;
}
.pred-btn .pi { font-size:1rem; }
.pred-btn .pl { font-size:0.5rem; font-weight:800; text-transform:uppercase; letter-spacing:0.2px; }
.pred-btn.sel-1 { background:#e8f5e9; border-color:var(--green2); color:var(--green); }
.pred-btn.sel-X { background:#e8f0fe; border-color:var(--blue2); color:var(--blue); }
.pred-btn.sel-2 { background:#ffebee; border-color:var(--red2); color:var(--red); }
.pred-btn.locked { cursor:not-allowed; opacity:0.45; border-style:dashed; }
.pred-btn.readonly { cursor:default; opacity:0.7; }
.pred-pts { font-size:0.62rem; font-weight:800; color:transparent; height:13px; }
.pred-pts.earned { color:var(--green); }
.star-badge { position:absolute; top:-5px; right:-5px; font-size:0.8rem; }
.lock-notice { font-size:0.65rem; color:var(--orange); font-weight:800; text-align:center; padding:3px 0 6px; }

/* Phase totals */
.phase-totals { background:var(--surface); border-radius:var(--radius); border:2px solid var(--border); padding:12px 14px; margin-top:6px; box-shadow:var(--shadow); }
.pt-title { font-size:0.65rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }
.pt-grid  { display:grid; grid-template-columns:repeat(auto-fill,minmax(70px,1fr)); gap:6px; }
.pt-item  { text-align:center; padding:8px 4px; border-radius:10px; background:var(--bg); }
.pt-item.me { background:linear-gradient(135deg,var(--navy),var(--blue)); }
.pt-name  { font-size:0.6rem; font-weight:800; color:var(--muted); text-transform:uppercase; }
.pt-name.me { color:rgba(255,255,255,0.8); }
.pt-pts   { font-family:'Fredoka One',sans-serif; font-size:1.3rem; color:var(--navy); }
.pt-pts.me { color:var(--gold2); }

/* ── HOY ── */
.hoy-hero {
  border-radius:var(--radius); padding:1.5rem 1.25rem; margin-bottom:1rem;
  background:linear-gradient(135deg,var(--navy),var(--blue),#0288d1);
  border:2px solid rgba(255,255,255,0.1); position:relative; overflow:hidden; text-align:center;
  box-shadow:var(--shadow);
}
.hoy-hero::before { content:"⚽"; position:absolute; font-size:8rem; opacity:0.06; top:-10px; right:-10px; }
.hoy-fecha { font-size:0.72rem; font-weight:800; color:var(--gold2); text-transform:uppercase; letter-spacing:1.5px; }
.hoy-count { font-family:'Fredoka One',sans-serif; font-size:2.2rem; color:#fff; line-height:1.1; margin:4px 0; }
.hoy-count span { color:var(--gold2); }
.hoy-teams { font-size:0.75rem; color:rgba(255,255,255,0.65); margin-top:4px; }

.aliento-card {
  background:var(--surface); border:2px solid var(--border); border-radius:var(--radius);
  padding:1rem 1.25rem; margin-bottom:1rem; display:flex; gap:12px; align-items:flex-start;
  box-shadow:var(--shadow);
}
.aliento-icon { font-size:1.8rem; flex-shrink:0; }
.aliento-text { font-size:0.9rem; font-weight:700; color:var(--navy); line-height:1.55; }
.aliento-text.loading { color:var(--muted); font-style:italic; font-weight:400; }

.curiosidad-card {
  background:linear-gradient(135deg,#fffde7,#fff8e1);
  border:2px solid #ffe082; border-radius:var(--radius);
  padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow);
}
.curi-header { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.curi-icon  { font-size:1.3rem; }
.curi-label { font-size:0.65rem; font-weight:800; color:#f57f17; text-transform:uppercase; letter-spacing:1px; }
.curi-text  { font-size:0.87rem; font-weight:700; color:var(--navy); line-height:1.6; }
.curi-text.loading { color:var(--muted); font-style:italic; font-weight:400; }

.hoy-empty { text-align:center; padding:3rem 1rem; }
.hoy-empty-icon  { font-size:3.5rem; margin-bottom:0.75rem; }
.hoy-empty-title { font-family:'Fredoka One',sans-serif; font-size:1.6rem; color:var(--navy); }
.hoy-empty-sub   { font-size:0.85rem; color:var(--muted); margin-top:8px; font-weight:600; }

/* ── MEDALLERO ── */
.med-wrap  { padding:0.25rem 0 1rem; }
.med-title { font-family:'Fredoka One',sans-serif; font-size:2rem; color:var(--navy); text-align:center; letter-spacing:1px; margin-bottom:4px; }
.med-sub   { text-align:center; font-size:0.72rem; color:var(--muted); font-weight:700; margin-bottom:1.5rem; }
.podium    { display:flex; align-items:flex-end; justify-content:center; gap:8px; margin-bottom:1.25rem; }
.pod-slot  { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; max-width:120px; }
.pod-avatar {
  width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',sans-serif; font-size:1.5rem; color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,0.2); border:3px solid rgba(255,255,255,0.6);
}
.pod-name  { font-size:0.78rem; font-weight:800; color:var(--navy); text-align:center; }
.pod-pts   { font-family:'Fredoka One',sans-serif; font-size:1.5rem; color:var(--navy); line-height:1; }
.pod-base  { width:100%; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; font-size:1.8rem; }
.pod-base-1 { height:85px; background:linear-gradient(160deg,#f9a825,#ffd54f); }
.pod-base-2 { height:60px; background:linear-gradient(160deg,#78909c,#b0bec5); }
.pod-base-3 { height:42px; background:linear-gradient(160deg,#8d6e63,#bcaaa4); }
.med-wait  { text-align:center; padding:3rem 1rem; }
.med-wait-icon  { font-size:3.5rem; margin-bottom:0.75rem; }
.med-wait-title { font-family:'Fredoka One',sans-serif; font-size:1.5rem; color:var(--navy); }
.med-wait-sub   { font-size:0.85rem; color:var(--muted); font-weight:600; margin-top:6px; line-height:1.5; }
.rest-list { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:1rem; box-shadow:var(--shadow); }
.rest-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:2px solid var(--border); }
.rest-item:last-child { border-bottom:none; }
.rest-item.is-me { background:#e8f0fe; }
.rest-rank   { font-family:'Fredoka One',sans-serif; font-size:1.2rem; color:var(--muted); width:24px; text-align:center; }
.rest-avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',sans-serif; font-size:1rem; color:#fff; flex-shrink:0; }
.rest-name   { flex:1; font-size:0.88rem; font-weight:800; color:var(--navy); }
.rest-pts    { font-family:'Fredoka One',sans-serif; font-size:1.3rem; color:var(--navy); }
.rest-lbl    { font-size:0.58rem; color:var(--muted); font-weight:700; }
.stats-grid  { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-card   { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow); }
.stat-lbl    { font-size:0.62rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; }
.stat-val    { font-family:'Fredoka One',sans-serif; font-size:1.7rem; color:var(--navy); line-height:1.1; margin-top:2px; }
.stat-sub    { font-size:0.7rem; color:var(--muted); font-weight:700; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--navy); color:#fff; padding:12px 24px; border-radius:99px;
  font-size:0.88rem; font-weight:800; z-index:9998; opacity:0;
  transition:all 0.3s; pointer-events:none; white-space:nowrap;
  box-shadow:0 8px 30px rgba(26,35,126,0.4); font-family:'Nunito',sans-serif;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── CONFETTI ── */
#confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:9999; }

@media (max-width:380px) {
  .preds-grid { grid-template-columns:repeat(3,1fr); }
  .member-btn { font-size:0.9rem; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-ball">⚽</div>
  <div class="load-title">Quiniela BraBo</div>
  <div class="load-sub">Cargando la magia...</div>
</div>
<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-top">
      <div class="login-emoji">🏆⚽</div>

function matchStarted(match) {
  if (!match || !match.f || match.utcH === undefined) return false;

  if (GRACE_DATES.includes(match.f) && now < GRACE_UNTIL) return false;
  const d = DATE_MAP[match.f];
  if (!d) return false;
  const kickoff = new Date(Date.UTC(2026, d[0], d[1], match.utcH, match.utcM||0, 0));
  return now >= kickoff;
}

      return a+(m.real&&m.preds?.[MEMBERS[i]]&&m.real===m.preds[MEMBERS[i]]?PTS:0);
    },0),0));

function getPhPts(ph) {
  return MEMBERS.map(n => ph.matches.reduce((a,_,mi)=>{

  const locked=matchStarted(match);
  return MEMBERS.map(n => {
    const v=preds?.[n]||"", isMe=n===me, proxy=!isMe&&canActAs(n);
    const canEdit=(isMe||proxy)&&!locked;
    const correct=real&&v&&real===v;
    const pts=correct?`+${PTS}`:"";
    const icon=v==="1"?F(lo):v==="X"?"🤝":v==="2"?F(vi):"❓";
    const lbl=v==="1"?lo.substring(0,7):v==="X"?"Empate":v==="2"?vi.substring(0,7):"Elegir";
    const inner=`<span class="pi">${icon}</span><span class="pl">${lbl}</span>`;
    return `<div class="pred-item ${isMe?'is-me':''} ${correct?'correct':''}">
      ${correct?'<span class="star-badge">⭐</span>':''}
      <div class="pred-name ${isMe?'me':''}">${n}${proxy?' ✏️':''}</div>
      ${canEdit
        ?`<button class="pred-btn ${v?'sel-'+v:''}" onclick="cyclePred('${phId}',${mi},'${n}')">${inner}</button>`
        :`<div class="pred-btn ${v?'sel-'+v:''} ${locked&&(isMe||proxy)?'locked':'readonly'}" style="${!v?'opacity:0.22;border-style:dashed':''}">${v?inner:'<span class="pi">·</span>'}</div>`
      }

  }).join("");
}

  try {
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:160,
        system,messages:[{role:"user",content:user}]})
    });
    const d=await r.json();
    return d.content?.[0]?.text||fallback;
  } catch(e){return fallback;}
}

    `Un dato INCREÍBLE y divertido sobre ${focusMatch.l} o ${focusMatch.v} que haría que un niño de 5 años dijera WOW.`,
    `¿Cuántos goles, jugadores o algo asombroso tiene ${focusMatch.l} o ${focusMatch.v}? Algo que sorprenda a niños.`,
    `Una comparación divertida del tamaño o poder de ${focusMatch.l} vs ${focusMatch.v} usando cosas que conocen los niños (dinosaurios, pizzas, etc).`,
    `El jugador más famoso de ${focusMatch.l} o ${focusMatch.v} — algo gracioso o increíble de él que no sabían.`,
    `¿Por qué el uniforme o la bandera de ${focusMatch.l} o ${focusMatch.v} tiene esos colores? Historia corta y sorprendente.`,
  ];

  const style=styles[Math.floor(Math.random()*styles.length)];
  const angle=angles[Math.floor(Math.random()*angles.length)];

  const [aliento,curiosidad]=await Promise.all([
    callClaude(
      `Eres el animador de la Quiniela BraBo, una quiniela familiar del Mundial 2026. ${style} Máximo 2 oraciones. Sin emojis al inicio.`,
      `Hoy juegan: ${matchList}. El jugador se llama ${me}. Escríbele algo divertido y motivador para que ponga su pronóstico HOY. Menciona su nombre. Que lo entiendan Lucca de 8 años y Liam de 5.`,
      `¡${me}, hoy hay fútbol! Pon tu pronóstico antes de que empiece el partido.`
    ),
    callClaude(
      `Eres el experto en datos curiosos de fútbol de la Quiniela BraBo. Respondes en español muy sencillo. Tus datos deben fascinar a niños de 5 y 8 años y también a los adultos. Sin emojis. Máximo 2 oraciones.`,
      `${angle} Que sea real, increíble y fácil de entender para un niño de 5 años. 2 oraciones máximo.`,
      `¡El fútbol es el deporte más popular del mundo — más de 4,000 millones de personas lo siguen, como si toda la Tierra jugara en el mismo equipo!`
    )
  ]);

  const e1=document.getElementById("aliento-text"), e2=document.getElementById("curi-text");
  if(e1){e1.textContent=aliento;e1.classList.remove("loading");}
  if(e2){e2.textContent=curiosidad;e2.classList.remove("loading");}
}

function renderMedallero() {
  const panel=document.getElementById("panel-med"); if(!panel)return;
  let jugados=0,aciertos=0;
  PHASES.forEach(ph=>ph.matches.forEach((_,mi)=>{
    const m=getMData(ph.id,mi);
    if(m.real){jugados++;MEMBERS.forEach(n=>{if(m.preds?.[n]===m.real)aciertos++;});}
  }));
  if(!jugados){
    panel.innerHTML=`<div class="med-wrap"><div class="med-title">🏅 Medallero</div>
      <div class="med-wait">
        <div class="med-wait-icon">⏳</div>
        <div class="med-wait-title">¡Esperando el primer gol!</div>
        <div class="med-wait-sub">El medallero aparece cuando Papá o Mamá<br>registren el resultado del primer partido.</div>
      </div></div>`;
    return;
  }
  const pts=getAllPts();
  const sorted=pts.map((v,i)=>({v,i,n:MEMBERS[i]})).sort((a,b)=>b.v-a.v);
  const top=sorted.slice(0,3);
  const order=top.length>=3?[top[1],top[0],top[2]]:top.length===2?[top[1],top[0]]:[top[0]];
  const bases=["pod-base-2","pod-base-1","pod-base-3"];
  const emojis=["🥈","🥇","🥉"];

  const podHtml=order.map((p,vi)=>{
    if(!p)return"";
    const isMe=p.n===me;
    return `<div class="pod-slot">
      <div class="pod-avatar" style="background:${COLORS[p.i]};${isMe?'box-shadow:0 0 0 4px var(--gold2),0 8px 20px rgba(249,168,37,0.4)':''}">${p.n[0]}</div>
      <div class="pod-name">${p.n.split(' ')[0]}${isMe?' 👈':''}</div>
      <div class="pod-pts">${p.v}</div>
      <div class="pod-base ${bases[vi]}">${emojis[vi]}</div>
    </div>`;
  }).join("");

  const restHtml=sorted.slice(3).map((p,ri)=>{
    const isMe=p.n===me;
    return `<div class="rest-item ${isMe?'is-me':''}">
      <div class="rest-rank">${ri+4}</div>
      <div class="rest-avatar" style="background:${COLORS[p.i]}">${p.n[0]}</div>
      <div class="rest-name">${p.n}${isMe?' 👈':''}</div>
      <div><div class="rest-pts">${p.v}</div><div class="rest-lbl">pts</div></div>
    </div>`;
  }).join("");

  const myRank=sorted.findIndex(s=>s.n===me)+1;
  const myPts=pts[MEMBERS.indexOf(me)];
  const leader=sorted[0],diff=leader.v-myPts;

  panel.innerHTML=`<div class="med-wrap">
    <div class="med-title">🏅 Medallero</div>
    <div class="med-sub">Basado en ${jugados} partido${jugados!==1?'s':''} jugado${jugados!==1?'s':''}</div>
    <div class="podium">${podHtml}</div>
    ${sorted.length>3?`<div class="rest-list">${restHtml}</div>`:''}
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl">Tu posición</div><div class="stat-val">#${myRank}</div><div class="stat-sub">de ${MEMBERS.length} jugadores</div></div>
      <div class="stat-card"><div class="stat-lbl">${diff===0?'¡Vas primero! 🏆':'Al líder te faltan'}</div><div class="stat-val">${diff===0?myPts+' pts':diff+' pts'}</div><div class="stat-sub">${diff===0?'¡Sigue así! 💪':leader.n+' lleva '+leader.v}</div></div>
      <div class="stat-card"><div class="stat-lbl">Partidos jugados</div><div class="stat-val">${jugados}</div><div class="stat-sub">de ${PHASES.reduce((a,ph)=>a+ph.matches.length,0)} totales</div></div>
      <div class="stat-card"><div class="stat-lbl">Aciertos familia</div><div class="stat-val">${aciertos}</div><div class="stat-sub">¡entre todos! 🎯</div></div>
    </div>
  </div>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const te=document.getElementById("tabs"), pe=document.getElementById("panels");
  te.innerHTML=""; pe.innerHTML="";
  const add=(id,label,active=false)=>{
    const t=document.createElement("button");
    t.className="tab"+(active?" active":""); t.innerHTML=label; t.dataset.id=id;
    t.onclick=()=>setTab(id); te.appendChild(t);
    const p=document.createElement("div");
    p.className="phase-panel"+(active?" active":""); p.id="panel-"+id; pe.appendChild(p);
  };
  add("hoy","🗓️ Hoy",true);
  add("med","🏅 Medallero");
  PHASES.forEach(ph=>add(ph.id,ph.label));
}

function setTab(id) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.id===id));
  document.querySelectorAll(".phase-panel").forEach(p=>p.classList.toggle("active",p.id==="panel-"+id));
}

// ── FIREBASE ──────────────────────────────────────────────────────────────────
let firstLoad=true;
function revealApp(){
  if(!firstLoad)return; firstLoad=false;
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
}

function subscribeDb() {
  setTimeout(revealApp,5000);
  const dbRef=db.ref("quiniela");
  dbRef.on("value",snap=>{
    dbState=snap.val()||{};
    revealApp(); renderAll(); setSyncStatus("online");
  },()=>{setSyncStatus("error");revealApp();});
  unsub=()=>dbRef.off();
}

function setSyncStatus(s) {
  const b=document.getElementById("sync-bar");
  if(s==="online") {b.textContent="● En línea · tiempo real";b.className="sync-bar";}
  if(s==="syncing"){b.textContent="↑ Guardando...";b.className="sync-bar syncing";}
  if(s==="error")  {b.textContent="✕ Sin conexión";b.className="sync-bar error";}
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function cyclePred(phId,mi,name) {
  const ph=PHASES.find(p=>p.id===phId);
  if(ph&&matchStarted(ph.matches[mi]))return;
  if(!canActAs(name))return;
  const cur=getMData(phId,mi).preds?.[name]||"";
  const cycle=["1","X","2",""];
  const next=cycle[(cycle.indexOf(cur)+1)%cycle.length];
  setSyncStatus("syncing");
  db.ref(`quiniela/${phId}/${mi}/preds/${name}`).set(next||null)
    .then(()=>{
      setSyncStatus("online");
      const real=getMData(phId,mi).real;
      if(real&&next&&real===next){confetti();showToast(name===me?`¡Acierto! 🎉 +${PTS} pts`:`¡${name} acertó! 🎉 +${PTS} pts`);}
    }).catch(()=>setSyncStatus("error"));
}

function setReal(phId,mi,val) {
  if(!canResult())return;
  setSyncStatus("syncing");
  db.ref(`quiniela/${phId}/${mi}/real`).set(val||null)
    .then(()=>{
      setSyncStatus("online");
      if(val){
        const preds=getMData(phId,mi).preds||{};
        const winners=MEMBERS.filter(n=>preds[n]===val);
        if(winners.length){confetti();showToast(`¡${winners.map(n=>n.split(' ')[0]).join(', ')} acertó! ⭐`);}
      }
    }).catch(()=>setSyncStatus("error"));
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function buildLogin() {
  document.getElementById("member-grid").innerHTML=MEMBERS.map(n=>
    `<button class="member-btn" onclick="selectMember(this,'${n}')">${n}</button>`
  ).join("");
}

function selectMember(btn,name) {
  document.querySelectorAll(".member-btn").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  btn.dataset.name=name;
  document.getElementById("login-btn").disabled=false;
}

function doLogin() {
  const sel=document.querySelector(".member-btn.selected");
  if(!sel)return;
  me=sel.dataset.name;
  localStorage.setItem("qb_user",me);
  document.getElementById("login-screen").style.display="none";
  document.getElementById("user-badge").textContent=me;
  buildTabs();
  subscribeDb();
}

function logout() {
  localStorage.removeItem("qb_user");
  me=null; if(unsub){unsub();unsub=null;} firstLoad=true;
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.querySelectorAll(".member-btn").forEach(b=>b.classList.remove("selected"));
  document.getElementById("login-btn").disabled=true;
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function confetti() {
  const canvas=document.getElementById("confetti-canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const colors=["#f9a825","#1976d2","#2e7d32","#e91e63","#6a1b9a","#00838f","#ff6f00","#ffcc02","#43a047","#1565c0"];
  const pieces=Array.from({length:130},()=>({
    x:Math.random()*canvas.width,y:-20,
    vx:(Math.random()-0.5)*6,vy:Math.random()*5+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    w:Math.random()*9+4,h:Math.random()*6+3,
    rot:Math.random()*360,vr:(Math.random()-0.5)*12,
    shape:Math.random()>0.5?'rect':'circle',
  }));
  let frame=0;
  const draw=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.06;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      ctx.restore();
    });
    if(++frame<200)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  };
  draw();
}

function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildLogin();
document.getElementById("loading").style.display="none";
const saved=localStorage.getItem("qb_user");
if(saved&&MEMBERS.includes(saved)){
  me=saved;
  document.getElementById("login-screen").style.display="none";
  document.getElementById("user-badge").textContent=me;
  buildTabs();
  subscribeDb();
}else{
  document.getElementById("login-screen").style.display="flex";
}
</script>
